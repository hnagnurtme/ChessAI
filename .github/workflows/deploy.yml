name: CI/CD Pipeline - Deploy to GCP

on:
  push:
    branches:
      - main
      - prod
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_BACKEND: chess-bot-backend
  IMAGE_FRONTEND: chess-bot-frontend
  GCP_HOST: ${{ secrets.GCP_HOST }}
  GCP_USERNAME: ${{ secrets.GCP_USERNAME }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        run: |
          echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.date }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:buildcache,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.date }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:buildcache,mode=max

  deploy-to-gcp:
    name: Deploy to Google Cloud Platform
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts

      - name: Create directories on GCP
        run: |
          ssh ${{ env.GCP_USERNAME }}@${{ env.GCP_HOST }} << 'ENDSSH'
            mkdir -p ~/chess-bot/scripts
            mkdir -p ~/chess-bot/nginx
          ENDSSH

      - name: Copy deployment files to GCP
        run: |
          scp docker-compose.prod.yml ${{ env.GCP_USERNAME }}@${{ env.GCP_HOST }}:~/chess-bot/
          scp scripts/deploy.sh ${{ env.GCP_USERNAME }}@${{ env.GCP_HOST }}:~/chess-bot/scripts/
          # Note: Nginx config already managed by install.sh, no need to copy on every deploy

      - name: Deploy on GCP via SSH
        run: |
          ssh ${{ env.GCP_USERNAME }}@${{ env.GCP_HOST }} << 'ENDSSH'
            cd ~/chess-bot
            
            # Export environment variables
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}
            export IMAGE_FRONTEND=${{ env.IMAGE_FRONTEND }}
            
            # Make deploy script executable
            chmod +x scripts/deploy.sh
            
            # Run deployment script
            ./scripts/deploy.sh
          ENDSSH

      - name: Health check
        run: |
          sleep 30
          curl -f http://${{ secrets.GCP_HOST }}/health || exit 1

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
