# Chess Bot Nginx Reverse Proxy Configuration
# Domain: chess-ai.cloud.hnagnurtme.id.vn (or your custom domain)
# This configuration supports HTTPS with Let's Encrypt SSL certificates

# Upstream definitions
upstream chess_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream chess_frontend {
    server 127.0.0.1:5175;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name chess-ai.cloud.hnagnurtme.id.vn;
    
    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    
    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chess-ai.cloud.hnagnurtme.id.vn;

    # SSL Certificate (Let's Encrypt)
    # Generate with: sudo certbot --nginx -d chess-ai.cloud.hnagnurtme.id.vn
    ssl_certificate /etc/letsencrypt/live/chess-ai.cloud.hnagnurtme.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chess-ai.cloud.hnagnurtme.id.vn/privkey.pem;
    
    # SSL Parameters
    include /etc/nginx/snippets/ssl-params.conf;

    # Max upload size
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/chess-ai-access.log;
    error_log /var/log/nginx/chess-ai-error.log warn;

    # Security headers (additional to ssl-params.conf)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript
               application/vnd.ms-fontobject application/font-woff 
               application/font-woff2 font/opentype;

    # Backend API
    location /api/ {
        # Rewrite to remove /api prefix
        rewrite ^/api(.*)$ $1 break;
        
        proxy_pass http://chess_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Backend API docs (FastAPI /docs)
    location /docs {
        proxy_pass http://chess_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API redoc
    location /redoc {
        proxy_pass http://chess_backend/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend OpenAPI schema
    location /openapi.json {
        proxy_pass http://chess_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://chess_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Frontend - React application
    location / {
        proxy_pass http://chess_frontend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        
        # Caching for static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://chess_frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
