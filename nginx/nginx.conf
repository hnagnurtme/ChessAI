# Nginx Reverse Proxy Configuration for Chess Bot on GCP
# Place this file at: /etc/nginx/sites-available/chess-bot
# Then: sudo ln -s /etc/nginx/sites-available/chess-bot /etc/nginx/sites-enabled/

# Upstream backend service
upstream chess_backend {
    server localhost:8000;
    keepalive 32;
}

# Upstream frontend service
upstream chess_frontend {
    server localhost:5175;
    keepalive 32;
}

# HTTP server - redirect to HTTPS (optional, for production with SSL)
# server {
#     listen 80;
#     server_name your-domain.com www.your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

# Main server block
server {
    listen 80;
    listen [::]:80;
    
    # Replace with your domain or remove for IP-only access
    server_name _;
    
    # Max upload size
    client_max_body_size 10M;
    
    # Logging
    access_log /var/log/nginx/chess-bot-access.log;
    error_log /var/log/nginx/chess-bot-error.log warn;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;
    
    # Backend API proxy
    location /api {
        # Rewrite /api to / for backend
        rewrite ^/api(.*)$ $1 break;
        
        proxy_pass http://chess_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # Backend API docs (FastAPI /docs)
    location /docs {
        proxy_pass http://chess_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Backend API OpenAPI schema
    location /openapi.json {
        proxy_pass http://chess_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://chess_backend/health;
        proxy_http_version 1.1;
        access_log off;
    }
    
    # Frontend - proxy to frontend container
    location / {
        proxy_pass http://chess_frontend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Caching for static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://chess_frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

